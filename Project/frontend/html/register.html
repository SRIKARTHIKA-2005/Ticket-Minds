<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - TicketMinds</title>
    <link rel="stylesheet" href="/css/styles.css">
    <script src="/js/app.js"></script>
</head>
<body>
    <div class="auth-wrapper">
        <div class="glass-panel auth-card">
            <div class="auth-header">
                <div class="logo-container" style="justify-content: center; margin-bottom: 20px;">
                    <div class="logo-icon">TM</div>
                    <div class="logo-text">TicketMinds</div>
                </div>
                <h2>Create Account</h2>
                <p style="color: var(--text-secondary); font-size: 0.9rem; margin-top: 8px;">Register to start submitting tickets</p>
            </div>

            <!-- Role Selector Tabs -->
            <div class="auth-tabs">
                <div class="auth-tab active" id="tab-user" onclick="setRole('user')">Customer</div>
                <div class="auth-tab" id="tab-engineer" onclick="setRole('engineer')">Support Engineer</div>
            </div>

            <form id="register-form">
                <input type="hidden" name="role" id="selected-role" value="user">
                
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" required placeholder="John Doe">
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" required placeholder="name@domain.com">
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required placeholder="••••••••">
                </div>

                <button type="submit" class="btn-primary auth-btn">
                    Register as <span id="btn-role-label">Customer</span>
                </button>
            </form>

            <div class="auth-footer">
                Already have an account? <a href="/login" id="login-link">Sign in here</a>
            </div>
        </div>
    </div>

    <script>
        function setRole(role) {
            document.getElementById('selected-role').value = role;
            
            const userTab = document.getElementById('tab-user');
            const engTab = document.getElementById('tab-engineer');
            const btnLabel = document.getElementById('btn-role-label');
            const loginLink = document.getElementById('login-link');
            
            if (role === 'user') {
                userTab.classList.add('active');
                engTab.classList.remove('active');
                btnLabel.textContent = 'Customer';
                loginLink.href = '/login?role=user';
            } else {
                engTab.classList.add('active');
                userTab.classList.remove('active');
                btnLabel.textContent = 'Support Engineer';
                loginLink.href = '/login?role=engineer';
            }
        }

        window.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const roleParam = params.get('role');
            if (roleParam === 'engineer' || roleParam === 'user') {
                setRole(roleParam);
            }
            
            // Handle form submission
            const form = document.getElementById('register-form');
            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const name = document.getElementById('name').value.trim();
                const email = document.getElementById('email').value.trim();
                const password = document.getElementById('password').value;
                const role = document.getElementById('selected-role').value;
                
                try {
                    await apiFetch('/api/auth/register', {
                        method: 'POST',
                        body: { name, email, password, role }
                    });
                    
                    showToast('Registration successful! Redirecting to login...', 'success');
                    
                    setTimeout(() => {
                        window.location.href = `/login?role=${role}`;
                    }, 1200);
                } catch (err) {
                    console.error('Registration error:', err);
                }
            });
        });
    </script>
</body>
</html>

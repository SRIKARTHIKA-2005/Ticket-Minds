services:
  - type: web
    name: multilingual-support-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        value: sqlite:////data/support.db
      - key: OLLAMA_URL
        value: http://localhost:11434
    disk:
      name: sqlite-data
      mountPath: /data
      sizeGB: 1
